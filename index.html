<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taxi App</title>
    <script src="https://telegram.org"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; text-align: center; background: #f4f4f4; }
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        input { width: 90%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
        button { 
            width: 100%; padding: 15px; background: #f7d117; 
            border: none; border-radius: 10px; font-weight: bold; 
            font-size: 18px; cursor: pointer; color: black;
        }
        button:active { background: #e0bc15; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🚖 Taksi Buyurtma</h2>
        <input type="text" id="from" placeholder="Qayerdan? (A manzil)">
        <input type="text" id="to" placeholder="Qayerga? (B manzil)">
        <button id="orderBtn">Buyurtma berish</button>
    </div>

    <script>
        // Telegram WebApp obyektini yuklash
        const tg = window.Telegram.WebApp;
        tg.expand(); // Oynani to'liq ochish

        const btn = document.getElementById("orderBtn");

        btn.addEventListener("click", function() {
            const from = document.getElementById("from").value;
            const to = document.getElementById("to").value;

            if (from.trim() === "" || to.trim() === "") {
                alert("Iltimos, manzillarni to'liq kiriting!");
                return;
            }

            const data = "A: " + from + " -> B: " + to;

            try {
                // MA'LUMOTNI YUBORISH
                tg.sendData(data);
                // Oynani yopish
                tg.close();
            } catch (error) {
                alert("Xatolik yuz berdi: " + error.message);
            }
        });
    </script>
</body>
</html>
