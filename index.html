<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Taxi Map</title>
    <!-- Telegram Web App -->
    <script src="https://telegram.org"></script>
    <!-- Leaflet CSS ва JS (Харита учун) -->
    <link rel="stylesheet" href="https://unpkg.com" />
    <script src="https://unpkg.com"></script>
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; }
        #map { width: 100vw; height: 70vh; background: #e0e0e0; }
        .footer { 
            height: 30vh; background: white; padding: 20px; 
            box-sizing: border-box; text-align: center;
            border-top: 2px solid #f7d117;
        }
        button { 
            width: 100%; padding: 15px; background: #f7d117; 
            border: none; border-radius: 10px; font-weight: bold; 
            font-size: 18px; cursor: pointer; color: black;
        }
        h3 { margin-top: 0; color: #333; }
        #status { color: #888; font-size: 14px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="footer">
        <h3>Qayerga boramiz?</h3>
        <p id="status">Xaritadan manzilni tanlang</p>
        <button id="mainButton">📍 Buyurtma berish</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        // Харитани чизиш (Тошкент координаталари)
        var map = L.map('map').setView([41.311, 69.240], 12);

        // Харита қаватларини юклаш (OpenStreetMap)
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        var marker;

        // Харитани босганда ишлайди
        map.on('click', function(e) {
            if (marker) {
                marker.setLatLng(e.latlng);
            } else {
                marker = L.marker(e.latlng).addTo(map);
            }
            document.getElementById('status').innerText = "Manzil tanlandi!";
            document.getElementById('status').style.color = "green";
        });

        // Тугма босилганда маълумотни юбориш
        document.getElementById('mainButton').onclick = function() {
            if (!marker) {
                tg.showAlert("Iltimos, avval xaritadan joyni tanlang!");
                return;
            }
            let lat = marker.getLatLng().lat.toFixed(5);
            let lng = marker.getLatLng().lng.toFixed(5);
            
            // Ботга юбориш
            tg.sendData(`${lat},${lng}`);
        };
    </script>
</body>
</html>
