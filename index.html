<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Taxi Map</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Telegram Web App -->
    <script src="https://telegram.org"></script>
    <!-- Leaflet CSS va JS -->
    <link rel="stylesheet" href="https://unpkg.com" />
    <script src="https://unpkg.com"></script>
    <style>
        #map { height: 400px; width: 100%; background: #eee; }
        body { margin: 0; padding: 10px; font-family: sans-serif; text-align: center; }
        button { width: 100%; padding: 15px; background: #f7d117; border: none; border-radius: 10px; font-weight: bold; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <h3>Manzilni tanlang:</h3>
    <div id="map"></div>
    <button id="sendBtn">📍 Buyurtma berish</button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        // Xaritani chizish (Toshkent)
        var map = L.map('map').setView([41.311, 69.240], 12);

        // OpenStreetMap qatlamini ulash
        L.tileLayer('https://openstreetmap.org{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap'
        }).addTo(map);

        var marker;

        map.on('click', function(e) {
            if (marker) { map.removeLayer(marker); }
            marker = L.marker([e.latlng.lat, e.latlng.lng]).addTo(map);
        });

        document.getElementById('sendBtn').onclick = function() {
            if (!marker) {
                alert("Xaritadan joyni tanlang!");
                return;
            }
            let pos = marker.getLatLng();
            tg.sendData(pos.lat.toFixed(5) + "," + pos.lng.toFixed(5));
        };
    </script>
</body>
</html>
