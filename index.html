<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taxi Map</title>
    <script src="https://telegram.org"></script>
    <!-- Yandex Maps API (Kalitsiz ham sinov rejimida ishlaydi) -->
    <script src="https://yandex.ru" type="text/javascript"></script>
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; text-align: center; background: #f0f0f0; }
        #map { width: 100%; height: 350px; background: #ccc; margin-bottom: 10px; }
        .box { padding: 20px; background: white; border-radius: 20px 20px 0 0; position: fixed; bottom: 0; width: 100%; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #f7d117; border: none; border-radius: 12px; font-weight: bold; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="map">Харита юкланмоқда...</div>
    <div class="box">
        <h3>📍 Қаерга борамиз?</h3>
        <p id="info">Харитадан манзилни танланг</p>
        <button id="orderBtn">Буюртма бериш</button>
    </div>

    <script type="text/javascript">
        let tg = window.Telegram.WebApp;
        tg.expand();

        ymaps.ready(function () {
            var myMap = new ymaps.Map("map", {
                center: [41.311, 69.240], // Тошкент
                zoom: 12,
                controls: ['zoomControl', 'geolocationControl']
            });

            var myPlacemark;

            // Харита босилганда
            myMap.events.add('click', function (e) {
                var coords = e.get('coords');

                if (myPlacemark) {
                    myPlacemark.geometry.setCoordinates(coords);
                } else {
                    myPlacemark = new ymaps.Placemark(coords, {}, { preset: 'islands#yellowTaxiIcon' });
                    myMap.geoObjects.add(myPlacemark);
                }
                document.getElementById('info').innerText = "Манзил белгиланди!";
            });

            document.getElementById('orderBtn').onclick = function() {
                if (!myPlacemark) {
                    alert("Илтимос, харитадан жойни танланг!");
                    return;
                }
                var coords = myPlacemark.geometry.getCoordinates();
                tg.sendData(coords[0].toFixed(5) + "," + coords[1].toFixed(5));
                tg.close();
            };
        });
    </script>
</body>
</html>
