<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taxi App</title>
    <script src="https://telegram.org"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f4f4f4; }
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .map-box { 
            width: 100%; height: 200px; background: #e0e0e0; 
            margin: 20px 0; border-radius: 10px; display: flex; 
            align-items: center; justify-content: center; font-weight: bold; color: #888;
            border: 2px dashed #ccc;
        }
        button { 
            width: 100%; padding: 15px; background: #f7d117; 
            border: none; border-radius: 10px; font-weight: bold; font-size: 18px; cursor: pointer; 
        }
        input { width: 90%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🚖 Taksi Buyurtma</h2>
        <p>Manzilingizni kiriting ёки харитадан танланг</p>
        
        <input type="text" id="from" placeholder="Qayerdan? (A manzil)">
        <input type="text" id="to" placeholder="Qayerga? (B manzil)">

        <div class="map-box" id="fakeMap">
            📍 Xarita yuklanmoqda...
        </div>

        <button id="orderBtn">Buyurtma berish</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        // Agar haqiqiy xarita yuklanmasa, biz oddiy matnli xabar yuboramiz
        document.getElementById('orderBtn').onclick = function() {
            let from = document.getElementById('from').value;
            let to = document.getElementById('to').value;
            
            if (from && to) {
                // Ma'lumotni botga yuborish
                tg.sendData("A: " + from + " -> B: " + to);
                tg.close();
            } else {
                alert("Iltimos, manzillarni kiriting!");
            }
        };

        // Telegram foydalanuvchi joylashuvini so'rash (Haqiqiy koordinata uchun)
        tg.MainButton.setText("MANZILNI TASDIQLASH").show();
        tg.MainButton.onClick(function() {
            let from = document.getElementById('from').value;
            let to = document.getElementById('to').value;
            tg.sendData("A: " + from + " -> B: " + to);
        });
    </script>
</body>
</html>
