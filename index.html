<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taxi App</title>
    <!-- Telegram Web App скрипти албатта бўлиши шарт -->
    <script src="https://telegram.org"></script>
    <style>
        body { font-family: sans-serif; background: #f0f0f0; padding: 20px; text-align: center; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; }
        button { width: 100%; padding: 15px; background: #f7d117; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 18px; margin-top: 10px; }
        button:active { background: #e0bc15; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Taksi Buyurtma Qilish</h2>
        <input type="text" id="from" placeholder="Qayerdan? (A manzil)">
        <input type="text" id="to" placeholder="Qayerga? (B manzil)">
        <button id="orderBtn">Buyurtma berish</button>
    </div>

    <script>
        // Telegram WebApp объектини фаоллаштириш
        let tg = window.Telegram.WebApp;
        tg.expand(); // Ойнани тўлиқ очиш

        let btn = document.getElementById("orderBtn");

        // Тугма босилганда ишлайдиган функция
        btn.addEventListener("click", function(){
            let from = document.getElementById('from').value;
            let to = document.getElementById('to').value;
            
            if (from.length < 2 || to.length < 2) {
                tg.showAlert("Iltimos, manzillarni to'liq kiriting!");
                return;
            }

            // МАЪЛУМОТНИ БОТГА ЮБОРИШ
            let result = "A: " + from + " -> B: " + to;
            tg.sendData(result); 
            
            // Юборилгандан кейин ойнани ёпиш
            tg.close();
        });
    </script>
</body>
</html>
